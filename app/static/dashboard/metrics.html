<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrics — HVAC Admin</title>
  <link rel="stylesheet" href="/dashboard/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    .period-toggle { display: flex; gap: 0; margin-left: auto; }
    .period-btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .period-btn:first-child { border-radius: 6px 0 0 6px; }
    .period-btn:last-child { border-radius: 0 6px 6px 0; }
    .period-btn + .period-btn { border-left: none; }
    .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .period-btn:hover:not(.active) { background: var(--bg); color: var(--text); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 800px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .chart-body { padding: 20px; position: relative; height: 260px; }

    .stat-grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .loading-overlay {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 15px;
    }
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: none;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<script src="/dashboard/app.js"></script>
<script>renderNav('metrics');</script>

<div class="page">
  <div class="page-header">
    <span class="page-title">Metrics</span>
    <span class="page-subtitle" id="periodLabel"></span>
    <div class="period-toggle" style="margin-left:auto">
      <button class="period-btn" data-period="7d">7 days</button>
      <button class="period-btn active" data-period="30d">30 days</button>
      <button class="period-btn" data-period="90d">90 days</button>
    </div>
  </div>

  <div id="errorBanner" class="error-banner"></div>
  <div id="loadingOverlay" class="loading-overlay">Loading metrics…</div>

  <div id="metricsContent" style="display:none">

    <!-- KPI bar -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Charts row 1 -->
    <p class="section-label">Call Volume &amp; Resolution</p>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="card-header"><span class="card-title">Calls Per Day</span></div>
        <div class="chart-body"><canvas id="chartCallsPerDay"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-header"><span class="card-title">Resolution Breakdown</span></div>
        <div class="chart-body"><canvas id="chartResolution"></canvas></div>
      </div>
    </div>

    <!-- Charts row 2 -->
    <p class="section-label">Duration &amp; Callers</p>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="card-header"><span class="card-title">Duration Distribution</span></div>
        <div class="chart-body"><canvas id="chartDuration"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-header"><span class="card-title">Caller Types</span></div>
        <div class="chart-body"><canvas id="chartCallerType"></canvas></div>
      </div>
    </div>

    <!-- Stat grids -->
    <p class="section-label">Safety</p>
    <div class="stat-grid-2" id="gridSafety"></div>

    <p class="section-label">Customers</p>
    <div class="stat-grid-2" id="gridCustomers"></div>

    <p class="section-label">Appointments</p>
    <div class="stat-grid-2" id="gridAppointments"></div>

    <p class="section-label">Quality</p>
    <div class="stat-grid-2" id="gridQuality"></div>

    <p class="section-label">Rates</p>
    <div class="stat-grid-2" id="gridRates"></div>

  </div>
</div>

<script>
  const CHART_COLORS = ['#4f6ef7','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316'];

  const charts = {};

  function destroyChart(key) {
    if (charts[key]) { charts[key].destroy(); delete charts[key]; }
  }

  function statCard(label, value, sub) {
    return `<div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${sub ? `<div style="color:var(--muted);font-size:12px;margin-top:6px">${sub}</div>` : ''}
    </div>`;
  }

  function fmtRate(v) { return v !== null && v !== undefined ? v.toFixed(1) + '%' : '—'; }
  function fmtNum(v) { return v !== null && v !== undefined ? v.toLocaleString() : '—'; }
  function fmtDurSec(v) {
    if (v === null || v === undefined) return '—';
    const m = Math.floor(v / 60);
    const s = Math.round(v % 60);
    return m > 0 ? `${m}m ${s}s` : `${s}s`;
  }

  function renderKPI(data) {
    document.getElementById('kpiGrid').innerHTML = [
      statCard('Total Calls', fmtNum(data.total_calls), `${fmtNum(data.inbound_calls)} in / ${fmtNum(data.outbound_calls)} out`),
      statCard('Containment Rate', fmtRate(data.containment_rate), 'resolved without transfer'),
      statCard('Avg Duration', fmtDurSec(data.avg_duration_sec), data.median_duration_sec !== null ? `median ${fmtDurSec(data.median_duration_sec)}` : null),
      statCard('Booking Rate', fmtRate(data.booking_rate), `${fmtNum(data.appointments_booked)} appointments`),
    ].join('');
  }

  function renderCallsPerDay(data) {
    destroyChart('cpd');
    const ctx = document.getElementById('chartCallsPerDay').getContext('2d');
    charts['cpd'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.calls_per_day.map(d => d.date),
        datasets: [{
          label: 'Calls',
          data: data.calls_per_day.map(d => d.count),
          borderColor: CHART_COLORS[0],
          backgroundColor: CHART_COLORS[0] + '22',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { maxTicksLimit: 10, font: { size: 11 } } },
          y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } } },
        },
      },
    });
  }

  function renderResolution(data) {
    destroyChart('res');
    const entries = Object.entries(data.resolution_counts);
    if (!entries.length) return;
    const ctx = document.getElementById('chartResolution').getContext('2d');
    charts['res'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [{ data: entries.map(([, v]) => v), backgroundColor: CHART_COLORS }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } },
      },
    });
  }

  function renderDuration(data) {
    destroyChart('dur');
    const ctx = document.getElementById('chartDuration').getContext('2d');
    charts['dur'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.duration_buckets.map(d => d.label),
        datasets: [{
          label: 'Calls',
          data: data.duration_buckets.map(d => d.count),
          backgroundColor: CHART_COLORS[0] + 'cc',
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } } },
          x: { ticks: { font: { size: 11 } } },
        },
      },
    });
  }

  function renderCallerType(data) {
    destroyChart('ct');
    const entries = Object.entries(data.caller_type_counts);
    if (!entries.length) return;
    const ctx = document.getElementById('chartCallerType').getContext('2d');
    charts['ct'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [{ data: entries.map(([, v]) => v), backgroundColor: CHART_COLORS }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } },
      },
    });
  }

  function renderStatGrids(data) {
    document.getElementById('gridSafety').innerHTML = [
      statCard('Safety Events', fmtNum(data.safety_event_count)),
      statCard('Safety Event Rate', fmtRate(data.safety_event_rate), 'of total calls'),
    ].join('');

    document.getElementById('gridCustomers').innerHTML = [
      statCard('New Customers', fmtNum(data.new_customers), 'first-time in period'),
      statCard('Returning Callers', fmtNum(data.returning_callers), 'prior call history'),
    ].join('');

    const apptTypeLine = Object.entries(data.appointment_type_counts).map(([k, v]) => `${k}: ${v}`).join(' · ') || '—';
    const apptStatusLine = Object.entries(data.appointment_status_counts).map(([k, v]) => `${k}: ${v}`).join(' · ') || '—';
    document.getElementById('gridAppointments').innerHTML = [
      statCard('Appointments Booked', fmtNum(data.appointments_booked), apptTypeLine),
      statCard('Appt Status', apptStatusLine),
    ].join('');

    document.getElementById('gridQuality').innerHTML = [
      statCard('Calls with Recording', fmtNum(data.calls_with_recording), fmtRate(data.recording_rate) + ' of calls'),
      statCard('Calls with Transcript', fmtNum(data.calls_with_transcript), fmtRate(data.transcript_rate) + ' of calls'),
    ].join('');

    document.getElementById('gridRates').innerHTML = [
      statCard('Transfer Rate', fmtRate(data.transfer_rate), 'transferred / escalated'),
      statCard('Abandonment Rate', fmtRate(data.abandonment_rate), 'abandoned calls'),
    ].join('');
  }

  function render(data) {
    renderKPI(data);
    renderCallsPerDay(data);
    renderResolution(data);
    renderDuration(data);
    renderCallerType(data);
    renderStatGrids(data);
  }

  let currentPeriod = '30d';

  async function loadMetrics(period) {
    const loading = document.getElementById('loadingOverlay');
    const content = document.getElementById('metricsContent');
    const errorBanner = document.getElementById('errorBanner');
    loading.style.display = 'block';
    content.style.display = 'none';
    errorBanner.style.display = 'none';

    try {
      const data = await apiFetch('/admin/metrics', { period });
      if (!data) return;
      const from = new Date(data.date_from).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const to = new Date(data.date_to).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      document.getElementById('periodLabel').textContent = `${from} – ${to}`;
      loading.style.display = 'none';
      content.style.display = 'block';
      render(data);
    } catch (err) {
      loading.style.display = 'none';
      errorBanner.textContent = 'Failed to load metrics: ' + err.message;
      errorBanner.style.display = 'block';
    }
  }

  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      loadMetrics(currentPeriod);
    });
  });

  loadMetrics(currentPeriod);
</script>
</body>
</html>
